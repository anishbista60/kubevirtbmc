apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/kubevirtbmc-serving-cert
  name: kubevirtbmc-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kubevirtbmc-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /mutate-virtualmachine-kubevirt-io-v1alpha1-virtualmachinebmc
  failurePolicy: Fail
  name: mvirtualmachinebmc-v1alpha1.kb.io
  rules:
  - apiGroups:
    - virtualmachine.kubevirt.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - virtualmachinebmcs
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/kubevirtbmc-serving-cert
  name: kubevirtbmc-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kubevirtbmc-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-virtualmachine-kubevirt-io-v1alpha1-virtualmachinebmc
  failurePolicy: Fail
  name: vvirtualmachinebmc-v1alpha1.kb.io
  rules:
  - apiGroups:
    - virtualmachine.kubevirt.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - virtualmachinebmcs
  sideEffects: None
